<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">

  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>Admin Bearbeiten</title>
  <style>
    body { font-family: Arial; margin: 2rem; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    td, th { border: 1px solid #999; padding: 0.5rem; }
    input { width: 100%; border: none; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; }
    .back-button { display: inline-block; margin-top: 2rem; padding: 0.75rem 1.2rem; background: #007acc; color: #fff; border: none; border-radius: 4px; text-decoration: none; cursor: pointer; }
    .back-button:hover { background: #005fa3; }
  </style>
</head>
<body>

<h1>Admin – Bearbeiten</h1>

<select id="konto">
  <option value="">Konto wählen</option>
</select>

<button onclick="loadCSV()">Laden</button>
<button onclick="addRow()">Neue Zeile</button>
<button onclick="deleteLastRow()">Letzte Zeile löschen</button>
<button onclick="uploadCSV()">Speichern</button>
<button class="back-button" onclick="window.location.href='index.html'">Zurück zur Startseite</button>

<div id="table"></div>

<button id="logoutBtn">Abmelden</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://wfvnjsuizeegpmktmgen.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_OezveOjxPGaNAX5yTWTEvg_lWIEd4OL";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const eingeloggt = false


document.addEventListener("DOMContentLoaded", async () => {
  const { data: { user }, error } = await supabaseClient.auth.getUser();

  if (error || !user) {
    // Weiterleitung auf Login-Seite, falls nicht eingeloggt
    window.location.href = "login.html";
    return;
  }

  const ADMIN_ID = "61614214-ab29-4de9-b27b-a1dc8f1e18f3"; // die Supabase-ID deines Admin-Users

  if (user.id !== ADMIN_ID) {
    alert("Kein Zugriff");
    window.location.href = "konto.html"; // normale Konto-Seite
    return;
  }
  else {
    // Admin ist eingeloggt, Seite laden
    eingeloggt = true;
  }

  // nur wenn Admin → Seite laden
});

const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.addEventListener("click", async () => {
  await supabaseClient.auth.signOut(); // Supabase-Session beenden
  window.location.href = "login.html"; // zurück zur Login-Seite
});

const accounts = ["jojo", "elisa", "3153234", "polizei", "papa", "tssk"];
const baseUrl = "https://wfvnjsuizeegpmktmgen.supabase.co/storage/v1/object/konten_csv/";
const API_KEY = "sb_publishable_OezveOjxPGaNAX5yTWTEvg_lWIEd4OL";

const jetzt = new Date(); // aktuelles Datum und Uhrzeit

// Formatierung als z. B. "TT.MM.JJJJ"
const tag = String(jetzt.getDate()).padStart(2, '0');
const monat = String(jetzt.getMonth() + 1).padStart(2, '0'); // Monate 0–11
const jahr = jetzt.getFullYear();
const aktuellesDatum = `${tag}.${monat}.${jahr}`;

let data = [];

if (!eingeloggt) {
    alert("Bitte einloggen");
    location.reload(true);
    return;
  }

// Dropdown füllen
const select = document.getElementById("konto");
accounts.forEach(a => {
  const opt = document.createElement("option");
  opt.value = a;
  opt.textContent = a;
  select.appendChild(opt);
});

async function loadCSV() {
  const konto = select.value;
  if (!konto) return alert("Konto wählen");

  const res = await fetch(baseUrl + "konto_" + konto + ".csv", {
    headers: {
      "apikey": API_KEY,
      "Authorization": "Bearer " + API_KEY
    }
  });

  if (!res.ok) {
    alert("Fehler beim Laden der CSV-Datei");
    console.error(await res.text());
    return;
  }

  const text = await res.text();
  data = text.trim().split("\n").map(r => r.split(","));
  render();
}

function render() {
  const div = document.getElementById("table");
  div.innerHTML = "";

  const table = document.createElement("table");

  data.forEach((row, i) => {
    const tr = document.createElement("tr");

    row.forEach((cell, j) => {
      const td = document.createElement(i === 0 ? "th" : "td");

      const input = document.createElement("input");
      input.value = cell;

      input.oninput = (e) => {
        data[i][j] = e.target.value;
      };

      td.appendChild(input);
      tr.appendChild(td);
    });

    table.appendChild(tr);
  });

  div.appendChild(table);
}

// Neue leere Zeile hinzufügen
function addRow() {
  if (data.length === 0) {
    alert("Bitte zuerst eine CSV laden");
    return;
  }
  const newRow = data[0].map(() => ""); // gleiche Anzahl an Spalten wie Header
  newRow[0] = aktuellesDatum; // erstes Feld mit aktuellem Datum füllen
  data.push(newRow);
  render();
}

// Letzte Zeile löschen
function deleteLastRow() {
  if (data.length <= 1) {
    alert("Keine Zeile zum Löschen vorhanden");
    return;
  }
  data.pop();
  render();
}

async function uploadCSV() {
  const konto = select.value;
  if (!konto) return;
  if (!eingeloggt) {
    alert("Nö");
    location.reload(true);
    return;
  }
  const csv = data.map(r => r.join(",")).join("\n");

  const res = await fetch(baseUrl + "konto_" + konto + ".csv", {
    method: "PUT",
    headers: {
      "Content-Type": "text/csv",
      "apikey": API_KEY,
      "Authorization": "Bearer " + API_KEY
    },
    body: csv
  });

  if (res.ok) {
    alert("Gespeichert ✅");
  } else {
    alert("Fehler ❌");
    console.error(await res.text());
  }
}
</script>

</body>
</html>
