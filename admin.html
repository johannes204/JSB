<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Admin Übersicht</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    h1 { color: #333; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #999; padding: 0.5rem; text-align: left; }
    th { background: #f0f0f0; }
    .error { color: #900; }
    .back-button {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.2rem;
      background: #007acc;
      color: #fff;
      border: none;
      border-radius: 4px;
      text-decoration: none;
      cursor: pointer;
    }
    .back-button:hover { background: #005fa3; }
  </style>
</head>
<body>
  <h1>Admin Übersicht</h1>
  <p>Alle Kontostände und Zinssätze der verfügbaren Konten.</p>
  <p id="status"></p>
  <div id="table-container"></div>
  <p id="total-amount"></p>
  <p id="total-interest"></p>
  <button class="back-button" onclick="window.location.href='admin_bearbeitung.html'">Bearbeiten der Kontostände</button>
  <button class="back-button" onclick="window.location.href='index.html'">Zurück zur Startseite</button>

  <script>
    const accounts = ["jojo", "elisa", "3153234", "polizei", "papa", "tssk"];
    const adminPassword = "geheim";

    const baseUrl = "https://wfvnjsuizeegpmktmgen.supabase.co/storage/v1/object/konten_csv/";
    const API_KEY = "sb_publishable_OezveOjxPGaNAX5yTWTEvg_lWIEd4OL";

    function formatNumber(value) {
      return value.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatPercent(value) {
      return value.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '%';
    }

    async function loadAdmin() {
      const enteredPassword = prompt('Admin-Passwort eingeben:');
      if (enteredPassword !== adminPassword) {
        alert('Zugriff verweigert. Falsches Passwort.');
        window.location.href = 'index.html';
        return;
      }

      const status = document.getElementById('status');
      const container = document.getElementById('table-container');
      status.textContent = '';
      container.innerHTML = '';

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');

      ['Konto', 'Kontostand in €', 'Zinssatz in % p.a.', 'Zinsausgaben in € p.a.']
        .forEach(header => {
          const th = document.createElement('th');
          th.textContent = header;
          headerRow.appendChild(th);
        });

      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      let totalAmount = 0;
      let totalInterest = 0;

      for (const konto of accounts) {
        const csvFile = `${baseUrl}konto_${konto}.csv`;

        try {
          const response = await fetch(csvFile, {
            headers: {
              "apikey": API_KEY,
              "Authorization": "Bearer " + API_KEY
            }
          });

          if (!response.ok) throw new Error('Datei nicht gefunden oder keine Berechtigung');

          const text = await response.text();
          const rows = text.trim().split('\n').map(line => line.split(','));

          const balance = rows.slice(1).reduce((sum, row) => {
            const value = parseFloat((row[1] || '').trim().replace(',', '.'));
            return !isNaN(value) ? sum + value : sum;
          }, 0);

          const rate = rows[1] && rows[1][3] ? rows[1][3].trim() : '';
          const rawRate = parseFloat((rate || '0.08').replace(',', '.'));
          const rateNumber = !isNaN(rawRate) ? rawRate / 100 : 0.0008;

          const interest = balance * rateNumber;

          totalAmount += balance;
          totalInterest += interest;

          const tr = document.createElement('tr');

          const tdKonto = document.createElement('td');
          tdKonto.textContent = konto;
          tr.appendChild(tdKonto);

          const tdBalance = document.createElement('td');
          tdBalance.textContent = formatNumber(balance);
          tr.appendChild(tdBalance);

          const tdRate = document.createElement('td');
          tdRate.textContent = formatPercent(!isNaN(rawRate) ? rawRate : 0.08);
          tr.appendChild(tdRate);

          const tdInterest = document.createElement('td');
          tdInterest.textContent = formatNumber(interest);
          tr.appendChild(tdInterest);

          tbody.appendChild(tr);

        } catch (err) {
          const tr = document.createElement('tr');

          const tdKonto = document.createElement('td');
          tdKonto.textContent = konto;
          tr.appendChild(tdKonto);

          const tdError = document.createElement('td');
          tdError.setAttribute('colspan', '3');
          tdError.textContent = 'Fehler: ' + err.message;
          tr.appendChild(tdError);

          tbody.appendChild(tr);
        }
      }

      table.appendChild(tbody);
      container.appendChild(table);

      document.getElementById('total-amount').textContent =
        'Gesamtgeldmenge: ' + formatNumber(totalAmount) + '€';

      document.getElementById('total-interest').textContent =
        'vsl. Gesamtzinsausgaben p.a.: ' + formatNumber(totalInterest) + '€';
    }

    document.addEventListener('DOMContentLoaded', loadAdmin);
  </script>
</body>
</html>
