<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>CSV Upload zu Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>CSV Upload</h1>
  <input type="file" id="fileInput" accept=".csv">
  <button onclick="uploadFile()">Hochladen</button>

  <script>
    // Supabase-Client initialisieren
    const supabaseUrl = "https://<your-project-id>.supabase.co";
    const supabaseKey = "<anon-public-key>";
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function uploadFile() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return alert("Bitte eine Datei auswählen");

      // Datei hochladen in Bucket 'csv-files'
      const { data, error } = await supabase.storage
        .from('csv-files')         // Name deines Buckets
        .upload(file.name, file, { upsert: true }); // überschreibt vorhandene Datei

      if (error) {
        console.error(error);
        alert("Upload fehlgeschlagen");
      } else {
        console.log("Datei hochgeladen:", data);
        alert("Upload erfolgreich!");
      }
    }
  </script>
</body>
</html>
