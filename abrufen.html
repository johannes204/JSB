<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>CSV anzeigen</title>
</head>
<body>
  <h1>CSV-Daten</h1>
  <div id="output"></div>

  <script>
    const csvUrl = "https://wfvnjsuizeegpmktmgen.supabase.co/storage/v1/object/public/konten_csv/konto_jojo.csv";

    async function loadCSV() {
      const response = await fetch(csvUrl);
      const text = await response.text();

      const rows = text.split('\n').filter(r => r.trim() !== '');
      const headers = rows.shift().split(',');

      const output = document.getElementById('output');
      rows.forEach(row => {
        const values = row.split(',');
        const div = document.createElement('div');
        headers.forEach((h,i) => div.textContent += `${h}: ${values[i]} `);
        output.appendChild(div);
      });
    }

    loadCSV();
  </script>
</body>
</html>
