<body>
  <h1>Willkommen auf der Website der Johannes Spielgeldbank</h1>
  
  <p>Die offizielle Website der Johannes Spielgeldbank</p>
  
  <h2>Kontakt</h2>
  <p>nur persönlich</p>

  <h2>Konto Login</h2>
  <input type="text" id="eingabe" placeholder="Name eingeben">
  <button onclick="pruefen()">Bestätigen</button>

<script>
function pruefen() {
  if (document.getElementById("eingabe").value === "Jojo") {
    window.location.href = "konto_jojo.html";
  }
  else {
    alert("Kontoname nicht gefunden. Bitte versuchen Sie es erneut.");
  }
}

document.getElementById("eingabe").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    pruefen();
  }
});
</script>


<script>

}
</script>
