<script>
const validKonten = ["jojo", "elisa", "3153234", "polizei", "papa", "tssk", "admin"];

function openKonto() {
  const konto = document.getElementById("kontoName").value.trim().toLowerCase();
  const status = document.getElementById("konto-status");
  if (!konto) {
    status.textContent = "Bitte einen Konto-Namen eingeben.";
    return;
  }
  if (!validKonten.includes(konto)) {
    status.textContent = "Konto nicht gefunden. Bitte überprüfe den Namen.";
    return;
  }
  status.textContent = "";
  if (konto === "admin") {
    window.location.href = "admin.html";
  } else {
    window.location.href = "konto.html?konto=" + encodeURIComponent(konto);
  }
}

document.getElementById("kontoOpen").addEventListener("click", openKonto);
document.getElementById("kontoName").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    openKonto();
  }
});
</script>
