<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JSB</title>
</head>

<body>
  <h1>Willkommen auf der Website der JSB</h1>
  
  <p>Die offizielle Website der Johannes Spielgeldbank</p>
  
  <h2>Kontakt</h2>
  <p>nur persönlich</p>

  <div style="margin-top: 4rem;"></div>

  <h2>Konto Login</h2>
  <input type="text" id="kontoName" placeholder="Konto-Name">
  <button id="kontoOpen">Login</button>
  <p id="konto-status"></p>

<script>
const validKonten = ["jojo", "elisa", "3153234", "polizei", "papa", "tssk", "admin"];

function openKonto() {
  const konto = document.getElementById("kontoName").value.trim().toLowerCase();
  const status = document.getElementById("konto-status");
  if (!konto) {
    status.textContent = "Bitte einen Konto-Namen eingeben.";
    return;
  }
  if (!validKonten.includes(konto)) {
    status.textContent = "Konto nicht gefunden. Bitte überprüfe den Namen.";
    return;
  }
  status.textContent = "";
  if (konto === "admin") {
    window.location.href = "admin.html";
  } else {
    window.location.href = "konto.html?konto=" + encodeURIComponent(konto);
  }
}

document.getElementById("kontoOpen").addEventListener("click", openKonto);
document.getElementById("kontoName").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    openKonto();
  }
});
</script>


<script>
function meineFunktion() {
  window.location.href = "konto_jojo.html";
}
</script>



</body>
</html>
