<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <style>
    body { font-family: Arial; margin: 2rem; text-align:center; }
    button { padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Admin Login</h1>
  <p>Bitte melde dich an, um fortzufahren.</p>
  <button id="loginBtn">Login mit GitHub</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wfvnjsuizeegpmktmgen.supabase.co";
    const SUPABASE_ANON_KEY = "DEIN_ANON_KEY";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const ADMIN_EMAILS = ["admin1@example.com", "admin2@example.com"]; // nur diese E-Mails haben Zugriff

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'github',
        options: {
          redirectTo: window.location.origin + '/admin_bearbeiten.html'
        }
      });

      if (error) {
        console.error("Login Fehler:", error.message);
        alert("Login fehlgeschlagen.");
      }
    });

    // Prüfen, ob der User bereits angemeldet ist
    (async () => {
      const { data: { user } } = await supabase.auth.getUser();

      if (user && ADMIN_EMAILS.includes(user.email)) {
        // Admin bereits angemeldet → weiterleiten
        window.location.href = "admin_bearbeiten.html";
      }
    })();
  </script>
</body>
</html>
