<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kontoübersicht</title>
<style>
  body { font-family: Arial, sans-serif; margin: 2rem; }
  h1, h2 { color: #333; }
  table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
  th, td { border: 1px solid #999; padding: 0.5rem; text-align: left; }
  td.negative { color: #c00; }
  th { background: #f0f0f0; }
  .error { color: #900; }
  .notice { margin-top: 1rem; color: #555; }
  .back-button { display: inline-block; margin-top: 2rem; padding: 0.75rem 1.2rem; background: #007acc; color: #fff; border: none; border-radius: 4px; text-decoration: none; cursor: pointer; }
  .back-button:hover { background: #005fa3; }
  label { margin-right: 0.5rem; }
  input[type="number"] { width: 100px; margin-right: 0.5rem; }
</style>
</head>
<body>
<h1>Kontoübersicht</h1>

<p id="status"></p>
<p id="interest-rate"></p>
<div id="table-container"></div>
<p class="notice">Kontostand: <strong><span id="sum-value"></span></strong></p>

<h2>Überweisung</h2>
<label>Nach Konto:</label>
<select id="nachKonto">
  <option value="">Konto wählen</option>
</select>
<label>Betrag (€):</label>
<input type="number" id="betragInput" step="0.01" />
<label>Kommentar:</label>
<input type="string" id="kommentarInput" />
<button onclick="ueberweisung()">Überweisen</button>
<p id="ueberweisungsStatus"></p>

<button class="back-button" onclick="window.location.href='index.html'">Zurück zur Startseite</button>

<script>
const accounts = ["jojo","elisa","3153234","polizei","papa","tssk"];
const baseUrl = "https://wfvnjsuizeegpmktmgen.supabase.co/storage/v1/object/konten_csv/";
const API_KEY = "sb_publishable_OezveOjxPGaNAX5yTWTEvg_lWIEd4OL";
const erlaubteKonten = accounts;

let dataKonten = {}; // alle geladenen CSVs

// Absenderkonto aus URL
function getQueryParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}
const vonKonto = getQueryParam('konto');
if (!vonKonto || !accounts.includes(vonKonto)) {
  alert("Ungültiges Konto in der URL.");
  throw new Error("Ungültiges Konto");
}

// Dropdown Empfänger füllen
const nachSelect = document.getElementById("nachKonto");
accounts.forEach(a => {
  if (a !== vonKonto) {
    const opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    nachSelect.appendChild(opt);
  }
});

// CSVs aller Konten laden
async function loadAllKonten() {
  for (const konto of accounts) {
    const res = await fetch(baseUrl + "konto_" + konto + ".csv", {
      headers: { "apikey": API_KEY, "Authorization": "Bearer " + API_KEY }
    });
    const text = await res.text();
    dataKonten[konto] = text.trim().split("\n").map(r => r.split(","));
  }
}

// Formatierung
function formatDate(value) {
  const parts = value.split('.').map(p => p.trim());
  if (parts.length !== 3) return value;
  const day = String(parseInt(parts[0],10)).padStart(2,'0');
  const month = String(parseInt(parts[1],10)).padStart(2,'0');
  const year = parseInt(parts[2],10);
  return `${day}.${month}.${year}`;
}
function formatPercent(value) {
  return value.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}) + '%';
}

// Konto anzeigen
function renderAccount() {
  const konto = vonKonto;
  const status = document.getElementById('status');
  const container = document.getElementById('table-container');
  const sumValue = document.getElementById('sum-value');

  status.textContent = '';
  container.innerHTML = '';
  sumValue.textContent = '';
  document.getElementById('interest-rate').textContent = '';

  if (!dataKonten[konto]) {
    status.textContent = 'Kontodaten noch nicht geladen.';
    status.className = 'error';
    return;
  }

  const rows = dataKonten[konto];
  if (rows.length < 2) {
    status.textContent = 'Keine Daten vorhanden.';
    status.className = 'error';
    return;
  }

  // Zinssatz
  const rateContent = rows[1][3] || '';
  if (rateContent) {
    const rawRate = parseFloat(rateContent.replace(',', '.'));
    if (!isNaN(rawRate)) document.getElementById('interest-rate').textContent = 'vereinbarter Zinssatz: ' + formatPercent(rawRate) + ' p.a.';
  }

  // Tabelle
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  rows[0].slice(0,3).forEach(c => { const th=document.createElement('th'); th.textContent=c; headerRow.appendChild(th); });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  let sum = 0;
  rows.slice(1).forEach(row => {
    const tr = document.createElement('tr');
    row.slice(0,3).forEach((cell,i)=>{
      const td = document.createElement('td');
      if(i===0) td.textContent = formatDate(cell.trim());
      else if(i===1) {
        const val = parseFloat(cell.replace(',', '.'));
        if(!isNaN(val)){
          td.textContent = val.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
          if(val<0) td.className='negative';
          sum+=val;
        } else td.textContent = cell;
      } else td.textContent = cell;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  container.appendChild(table);

  sumValue.textContent = sum.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function getKontostand(konto) {
  if (!dataKonten[konto]) return 0;

  return dataKonten[konto].slice(1).reduce((sum, row) => {
    const val = parseFloat((row[1] || "").replace(',', '.'));
    return !isNaN(val) ? sum + val : sum;
  }, 0);
}

// Überweisung
async function ueberweisung() {
  if (!dataKonten[vonKonto]) { alert("Kontodaten noch nicht geladen."); return; }

  const nach = nachSelect.value;
  const betrag = parseFloat(document.getElementById("betragInput").value);
  if (!nach || isNaN(betrag) || betrag <=0) { alert("Bitte Empfänger und gültigen Betrag wählen."); return; }
  if (betrag > getKontostand(vonKonto)) { alert("Ungenügender Kontostand."); return; }
  if (betrag > 5000) { alert("Überschreitung des maximalen Überweisungsbetrags. Bitte wenden Sie sich an den Kundenservice für Überweisungen ab 5000€."); return; }

  const jetzt = new Date();
  const tag = String(jetzt.getDate()).padStart(2,'0');
  const monat = String(jetzt.getMonth()+1).padStart(2,'0');
  const jahr = jetzt.getFullYear();
  const aktuellesDatum = `${tag}.${monat}.${jahr}`;

  // Absenderkonto (negativer Betrag)
  dataKonten[vonKonto].push([aktuellesDatum, (-betrag).toString(), `Überweisung an ${nach}`+"     "+document.getElementById("kommentarInput").value, '']);
  // Empfängerkonto (positiver Betrag)
  dataKonten[nach].push([aktuellesDatum, betrag.toString(), `Überweisung von ${vonKonto}` + "     " + document.getElementById("kommentarInput").value, '']);

  // CSVs hochladen
  await Promise.all([vonKonto,nach].map(async konto=>{
    const csv = dataKonten[konto].map(r=>r.join(",")).join("\n");
    const res = await fetch(baseUrl+"konto_"+konto+".csv",{
      method:"PUT",
      headers:{
        "Content-Type":"text/csv",
        "apikey":API_KEY,
        "Authorization":"Bearer "+API_KEY
      },
      body:csv
    });
    if(!res.ok) console.error(await res.text());
  }));

  document.getElementById("ueberweisungsStatus").textContent =
    `Überweisung von ${betrag.toFixed(2)}€ von ${vonKonto} nach ${nach} erfolgreich!`;

  renderAccount();
}

// Alles laden beim Start
document.addEventListener("DOMContentLoaded", async ()=>{
  await loadAllKonten();
  renderAccount();
});
</script>
</body>
</html>
