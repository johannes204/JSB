<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>CSV Upload zu Firestore</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <h1>CSV Upload zu Firestore</h1>
  <input type="file" id="csvFile" accept=".csv">
  <button onclick="uploadCSV()">Hochladen</button>

  <script>
    // Firebase initialisieren
    const firebaseConfig = {
      apiKey: "AIzaSyA-i3qMv2dZbRloTsWM7FrrR8eR40Mx5vY",
      authDomain: "jsb-firestore.firebaseapp.com",
      projectId: "jsb-firestore",
      storageBucket: "jsb-firestore.firebasestorage.app",
      messagingSenderId: "611249259489",
      appId: "1:611249259489:web:86afa036214d0b897e08a0",
      measurementId: "G-NX0KCSRXTT"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function uploadCSV() {
      const fileInput = document.getElementById('csvFile');
      if (!fileInput.files.length) return alert("Bitte CSV auswählen");

      const file = fileInput.files[0];
      const text = await file.text();

      const rows = text.split('\n').filter(r => r.trim() !== '');
      const headers = rows.shift().split(',');

      for (const row of rows) {
        const values = row.split(',');
        const docData = {};
        headers.forEach((h,i) => docData[h] = values[i]?.trim());
        await db.collection("users").add(docData);
      }

      alert("Upload abgeschlossen!");
    }
  </script>
</body>
</html>
