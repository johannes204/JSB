<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Konto Jojo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    h1 { color: #333; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #999; padding: 0.5rem; text-align: left; }
    th { background: #f0f0f0; }
    .error { color: #900; }
  </style>
</head>
<body>
  <h1>Konto Jojo</h1>
  <p>Buchungen und Kontostand zum Konto Jojo</p>

  <p id="status"></p>
  <div id="table-container"></div>
  <p>Kontostand: <strong><span id="sum-value"></span></strong></p>

  <script>
    async function loadCsv() {
      const status = document.getElementById('status');
      const container = document.getElementById('table-container');
      status.textContent = '';
      status.className = '';
      container.innerHTML = '';

      try {
        const response = await fetch('data.csv');
        if (!response.ok) throw new Error('Datei nicht gefunden: ' + response.status);
        const text = await response.text();
        const rows = text.trim().split('\n').map(line => line.split(','));
        if (rows.length === 0 || rows[0].length === 0) {
          status.textContent = 'CSV-Datei ist leer oder ungültig.';
          return;
        }

        const table = document.createElement('table');
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        rows[0].forEach(cell => {
          const th = document.createElement('th');
          th.textContent = cell;
          headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        let sum = 0;
        rows.slice(1).forEach(row => {
          const tr = document.createElement('tr');
          row.forEach((cell, index) => {
            const td = document.createElement('td');
            td.textContent = cell;
            tr.appendChild(td);
            if (index === 1) {
              const value = parseFloat(cell.replace(',', '.'));
              if (!isNaN(value)) sum += value;
            }
          });
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        container.appendChild(table);
        document.getElementById('sum-value').textContent = sum.toLocaleString('de-DE', {minimumFractionDigits: 2, maximumFractionDigits: 2});
      } catch (err) {
        status.textContent = 'Fehler beim Laden: ' + err.message;
        status.className = 'error';
      }
    }

    document.addEventListener('DOMContentLoaded', loadCsv);
  </script>
</body>
</html>
